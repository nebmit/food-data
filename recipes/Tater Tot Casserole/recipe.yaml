instructions:

- “Preheat the oven to 218°C. Set out a 20x28cm casserole dish.”
- “Heat 30ml [olive oil] in a large frying pan over medium heat.”
- “Cook 2 cloves [garlic] for several minutes until golden brown and fragrant.”
- “Add 680g [ground beef] and cook for a few minutes, breaking it up, until completely browned.”
- “Stir in 60ml [dark brown sugar], 30ml [tomato paste], 15ml [Worcestershire sauce], 0.5 tsp [dried savory], and 240ml [mixed frozen vegetables]. Combine thoroughly.”
- “Season with [salt] and [pepper] to taste.”
- “Remove from heat and transfer the mixture to the casserole dish.”
- “Top the meat mixture evenly with 360ml [cheddar cheese].”
- “Lay the [frozen tater tots] on top in even rows.”
- “Bake for 30 minutes until the tater tots are crispy.”
- “For extra crispiness, place under the broiler for 2–3 minutes, watching closely to prevent burning.”
- “Serve hot with ketchup or condiments of choice.”

note:

- “Dried thyme can be substituted for dried savory if unavailable.”
- “Soy sauce is a surprisingly good condiment pairing.”
- “This recipe is gluten-free as written, but check tater tot packaging to confirm.”
- “Ground turkey can be used in place of ground beef for a lighter version.”