meta:
  description: "Thick, chewy chocolate chip cookies with crisp edges and soft, gooey centres using chopped chocolate."
  source: "100 Cookies by Sarah Kieffer (Chronicle Books, 2020)"
  cuisine: "American"

portion:
  quantity: 24
  descriptor: "cookies"
  active_time_minutes: 20
  passive_time_minutes: 11
  complexity_rating: 2
  mayhem_rating: 2

tags:
  - "Vegetarian"
  - "Dessert"
  - "Baking"

ingredients:
  - name: Flour
    quantity: 355
    measurement: grams
  - name: Baking soda
    quantity: 1
    measurement: teaspoon
  - name: Fine salt
    quantity: 0.75
    measurement: teaspoon
  - name: Butter
    quantity: 170
    measurement: grams
    prep: "room temperature"
  - name: Granulated sugar
    quantity: 150
    measurement: grams
  - name: Brown sugar
    quantity: 150
    measurement: grams
  - name: Egg
    quantity: 2
    measurement: unit
  - name: Vanilla extract
    quantity: 1.5
    measurement: teaspoon
  - name: Dark chocolate
    quantity: 198
    measurement: grams
    prep: "coarsely chopped"
    sub: "or chocolate chips"

items:
  - name: Oven
    quantity: 1
  - name: Stand mixer
    quantity: 1
    sub: "or hand mixer"
  - name: Baking tray
    quantity: 3
  - name: Mixing bowl
    quantity: 1
  - name: Wire rack
    quantity: 1

instructions:
  - "Preheat the oven to 180°C. Line three baking trays with parchment paper."
  - "Whisk together 355g [flour], 1 tsp [baking soda], and 0.75 tsp [fine salt] in a mixing bowl. Set aside."
  - "Beat 170g [butter] in a stand mixer on medium speed until creamy, about 1 minute."
  - "Add 150g [granulated sugar] and 150g [brown sugar]. Beat on medium speed until light and fluffy, 2–3 minutes. Scrape down the sides."
  - "Add the [egg] one at a time, mixing until combined after each addition."
  - "Add 1.5 tsp [vanilla extract] and mix until smooth."
  - "Add the flour mixture and beat on low speed until just combined."
  - "Fold in 198g [dark chocolate] with a spatula until evenly distributed."
  - "Scoop the dough into 45g balls and place 8 per tray, evenly spaced."
  - "Bake one tray at a time for 8 minutes until the cookies are slightly puffed in the centre."
  - "Tap the tray gently on the oven rack, then bake for a further 2–3 minutes until the edges are just turning golden but the centres remain soft."
  - "Tap the tray once more, then transfer to a wire rack. Cool on the tray for 5 minutes before moving."

note:
  - "Chopping a bar of chocolate rather than using chips creates irregular shards and melted puddles throughout."
  - "Do not overbake — the centres should look underset when removed from the oven."
  - "Add a pinch of flaky sea salt on top of each dough ball before baking."
