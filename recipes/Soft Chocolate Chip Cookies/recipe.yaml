portion:
  quantity: 24
  descriptor: "cookies"
  active_time_minutes: 20
  passive_time_minutes: 11
  complexity_rating: 2
  mayhem_rating: 2

tags:
  - "Vegetarian"
  - "Dessert"
  - "Baking"

ingredients:
  - name: All-purpose flour
    quantity: 355
    measurement: grams
  - name: Baking soda
    quantity: 1
    measurement: teaspoon
  - name: Fine salt
    quantity: 0.75
    measurement: teaspoon
  - name: Unsalted butter, room temperature
    quantity: 170
    measurement: grams
  - name: Granulated sugar
    quantity: 150
    measurement: grams
  - name: Brown sugar
    quantity: 150
    measurement: grams
  - name: Egg
    quantity: 2
    measurement: unit
  - name: Pure vanilla extract
    quantity: 1.5
    measurement: teaspoon
  - name: Bittersweet or semisweet chocolate, coarsely chopped
    quantity: 198
    measurement: grams

items:
  - name: Oven
    quantity: 1
  - name: Stand mixer with paddle attachment
    quantity: 1
  - name: Baking tray
    quantity: 3
  - name: Mixing bowl
    quantity: 1
  - name: Wire rack
    quantity: 1

instructions:
  - "Preheat the oven to 180°C. Line three baking trays with parchment paper."
  - "Whisk together {1:All-purpose flour}, {1:Baking soda}, and {1:Fine salt} in a mixing bowl. Set aside."
  - "Beat {1:Unsalted butter, room temperature} in a stand mixer on medium speed until creamy, about 1 minute."
  - "Add {1:Granulated sugar} and {1:Brown sugar} and beat on medium speed until light and fluffy, 2–3 minutes. Scrape down the sides and bottom of the bowl."
  - "Add {1:Egg} one at a time, mixing until combined after each addition."
  - "Add {1:Pure vanilla extract} and mix until smooth. Scrape down the bowl."
  - "Add the flour mixture and beat on low speed until just combined."
  - "Add {1:Bittersweet or semisweet chocolate, coarsely chopped} and mix on low speed until distributed. Finish mixing with a spatula."
  - "Scoop dough into 45g balls and place 8 per tray, evenly spaced."
  - "Bake one tray at a time for 8 minutes, until cookies are slightly puffed in the centre."
  - "Tap the tray gently on the oven rack, then bake for a further 2–3 minutes until edges are just turning golden but centres remain soft."
  - "Tap the tray once more, then transfer to a wire rack."
  - "Cool on the tray for 5 minutes before moving. Cookies will look underdone — this is correct."

note:
  - "Chop a bar of chocolate rather than using chips for irregular shards and melted puddles throughout."
  - "Using chips instead of chopped chocolate will produce slightly puffier cookies."
  - "Do not overbake — the centres should look underset when removed from the oven."
  - "Add a pinch of flaky sea salt on top of each dough ball before baking."
  - "Recipe from 100 Cookies by Sarah Kieffer (Chronicle Books, 2020)."
