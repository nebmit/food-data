meta:
  description: "Rich, fudgy blondies loaded with white chocolate chips and a golden caramelised top."
  source: "Original"
  cuisine: "American"

portion:
  quantity: 16
  descriptor: "pieces"
  active_time_minutes: 40
  passive_time_minutes: 120
  complexity_rating: 2
  mayhem_rating: 2

tags:
  - "Vegetarian"
  - "Dessert"
  - "Baking"

ingredients:
  - name: Butter
    quantity: 175
    measurement: grams
  - name: White chocolate
    quantity: 175
    measurement: grams
    prep: "roughly chopped"
  - name: Sugar
    quantity: 100
    measurement: grams
  - name: Brown sugar
    quantity: 100
    measurement: grams
  - name: Egg
    quantity: 3
    measurement: unit
  - name: Flour
    quantity: 175
    measurement: grams
  - name: White chocolate chips
    quantity: 250
    measurement: grams

items:
  - name: Oven
    quantity: 1
  - name: Heatproof bowl
    quantity: 1
  - name: Baking tin
    quantity: 1

instructions:
  - "Preheat the oven to 180°C (160°C fan). Line a baking tin with parchment paper."
  - "Melt 175g [butter] and 175g [white chocolate] in a heatproof bowl set over a pan of simmering water, stirring until smooth."
  - "In a separate bowl, whisk 100g [sugar], 100g [brown sugar], and the [egg] together until combined."
  - "Fold in 175g [flour] and 250g [white chocolate chips]."
  - "Pour in the melted butter and white chocolate mixture. Stir until just combined."
  - "Pour the batter into the lined tin and bake for 22–27 minutes, until there is the slightest wobble in the centre."
  - "Let the blondies cool completely in the tin, then refrigerate overnight for the best fudgy texture."

note:
  - "Drizzle with melted white chocolate for decoration."
  - "Add dried cranberries or macadamia nuts for extra texture."
  - "The blondies will firm up significantly as they cool and chill."
