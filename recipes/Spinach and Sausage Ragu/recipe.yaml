meta:
  description: "A rich, hearty pasta ragu with pork sausage, wilted spinach, and a splash of milk for creaminess."
  source: "Original"
  cuisine: "Italian"

portion:
  quantity: 4
  descriptor: "servings"
  active_time_minutes: 30
  passive_time_minutes: 20
  complexity_rating: 2
  mayhem_rating: 2

ingredients:
  - name: Rigatoni pasta
    quantity: 350
    measurement: grams
  - name: Chopped tomatoes
    quantity: 1
    measurement: can
  - name: Spinach
    quantity: 200
    measurement: grams
  - name: Milk
    quantity: 150
    measurement: ml
  - name: Pork sausage
    quantity: 4
    measurement: unit
    prep: "casings removed, meat crumbled"
  - name: Onion
    quantity: 1
    measurement: unit
    prep: "diced"
  - name: Garlic
    quantity: 2
    measurement: clove
    prep: "finely chopped"
  - name: Rosemary
    quantity: 2
    measurement: teaspoon
    prep: "finely chopped"
  - name: Chili flakes
    quantity: 1
    measurement: teaspoon

pantry:
  - name: Water
    quantity: 100
    measurement: ml
  - name: Salt
    quantity: 1
    measurement: pinch
  - name: Olive oil
    quantity: 15
    measurement: ml

items:
  - name: Large pot
    quantity: 1
  - name: Large frying pan
    quantity: 1

instructions:
  - "Bring a large pot of salted [water] to a boil. Cook the [rigatoni pasta] until al dente according to package instructions. Drain."
  - "Meanwhile, heat 15ml [olive oil] in a large frying pan over medium heat. Add the [pork sausage] and [onion], cooking until the sausage is browned and the onion is soft."
  - "Add the [garlic], [rosemary], and [chili flakes]. Cook for 1 minute until fragrant."
  - "Pour in the [chopped tomatoes] and 100ml [water]. Simmer for 10 minutes until thickened."
  - "Stir in the [spinach] and 150ml [milk]. Cook until the spinach wilts, about 2 minutes."
  - "Add the drained pasta to the pan and toss to coat. Season with [salt] to taste."

note:
  - "Use Italian-style sausages for the best flavour."
  - "Finish with grated parmesan cheese on top."
  - "Substitute spinach with kale for a slightly heartier dish."
