meta:
  description: "Pan-fried gnocchi with tender broccoli and sliced sirloin steak in a buttery garlic sauce."
  source: "Original"
  cuisine: "Italian"

portion:
  quantity: 4
  descriptor: "servings"
  active_time_minutes: 30
  passive_time_minutes: 15
  complexity_rating: 2
  mayhem_rating: 1

ingredients:
  - name: Potato gnocchi
    quantity: 500
    measurement: grams
  - name: Broccoli
    quantity: 300
    measurement: grams
    prep: "cut into small florets"
  - name: Sirloin steak
    quantity: 400
    measurement: grams
  - name: Parmesan cheese
    quantity: 50
    measurement: grams
    prep: "grated"
  - name: Garlic
    quantity: 2
    measurement: clove
    prep: "thinly sliced"
  - name: Butter
    quantity: 50
    measurement: grams

pantry:
  - name: Olive oil
    quantity: 30
    measurement: ml
  - name: Salt
    quantity: 1
    measurement: pinch
  - name: Pepper
    quantity: 1
    measurement: pinch

items:
  - name: Large frying pan
    quantity: 1

instructions:
  - "Season the [sirloin steak] with [salt] and [pepper]. Heat 15ml [olive oil] in a large frying pan over high heat."
  - "Sear the steak for 2–3 minutes on each side for medium-rare. Remove from the pan and rest for 5 minutes, then slice."
  - "In the same pan, melt the [butter] over medium heat. Add the [potato gnocchi] and cook for 5–6 minutes until golden brown on all sides."
  - "Add the [garlic] and [broccoli] to the pan. Toss to combine and cook for 3–4 minutes until the broccoli is tender-crisp."
  - "Season with [salt] and [pepper]. Serve the gnocchi and broccoli topped with sliced steak and a generous sprinkle of [parmesan cheese]."

note:
  - "Let the steak rest before slicing to keep it juicy."
  - "Substitute steak with chicken breast for a lighter option."
