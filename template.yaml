# Commented Line (ignored by parser)
portion:
  quantity: <Integer>
  descriptor: <String>
  active_time_minutes: <Integer>
  passive_time_minutes: <Integer>
  complexity_rating: <Integer>
  mayhem_rating: <Integer>

# Optional Section
tags:
  - <String>

ingredients:
  - name: <String>
    quantity: <Number>
    measurement: <String>

# Optional Section 
# Ingredients used in the instructions that should not be listed in the ingredients section (e.g. water)
common_ingredients:
  - name: <String>
    quantity: <Number>
    measurement: <String>

items:
  - name: <String>
    quantity: <Number>

# Refer to ingredients with {Percentage Amount:Ingredient Name} e.g. {0.5:flour}, for 50% of the flour in the ingredients section
instructions:
  - <String>

# Optional Section
note:
  - <String>
